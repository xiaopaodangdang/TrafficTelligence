<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>交通流量时序预测 (Traffic Flow Time-Series Prediction)</title>
    <!-- ECharts CDN -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #333;
        }
        #chart {
            width: 100%;
            height: 500px;
            margin-top: 20px;
        }
        .loading {
            text-align: center;
            font-size: 18px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>交通流量时序预测大屏 (Traffic Flow Prediction)</h1>
        <div id="loading" class="loading">加载数据中... (Loading data...)</div>
        <div id="chart"></div>
    </div>

    <script>
        var myChart = echarts.init(document.getElementById('chart'));

        fetch('/api/predict')
            .then(response => response.json())
            .then(data => {
                if (data.error) {
                    document.getElementById('loading').innerText = '错误: ' + data.error;
                    return;
                }
                document.getElementById('loading').style.display = 'none';

                const histTimes = data.historical.times;
                const histValues = data.historical.values;
                const predTimes = data.prediction.times;
                const predValues = data.prediction.values;

                const lastHistTime = histTimes[histTimes.length - 1];
                const lastHistValue = histValues[histValues.length - 1];
                
                const finalPredTimes = [lastHistTime, ...predTimes];
                const finalPredValues = [lastHistValue, ...predValues];

                const allTimes = [...histTimes, ...predTimes];

                const histData = new Array(allTimes.length).fill(null);
                for(let i=0; i<histTimes.length; i++) {
                    histData[i] = histValues[i];
                }

                const predData = new Array(allTimes.length).fill(null);
                const offset = histTimes.length - 1;
                for(let i=0; i<finalPredTimes.length; i++) {
                    predData[offset + i] = finalPredValues[i];
                }

                const option = {
                    title: {
                        text: '过去7天历史与未来48小时预测 (Past 7 Days & Next 48 Hours)',
                        left: 'center',
                        top: 0
                    },
                    tooltip: {
                        trigger: 'axis',
                        axisPointer: { type: 'cross' }
                    },
                    legend: {
                        data: ['历史流量 (Historical)', '预测流量 (Prediction)'],
                        top: 30
                    },
                    grid: {
                        left: '3%',
                        right: '4%',
                        bottom: '10%',
                        top: 80,
                        containLabel: true
                    },
                    dataZoom: [
                        {
                            type: 'slider',
                            show: true,
                            start: 70,
                            end: 100
                        },
                        {
                            type: 'inside',
                            start: 70,
                            end: 100
                        }
                    ],
                    xAxis: {
                        type: 'category',
                        boundaryGap: false,
                        data: allTimes,
                        axisLabel: {
                            formatter: function (value) {
                                return value.substring(5, 16); // Show MM-DD HH:mm
                            }
                        }
                    },
                    yAxis: {
                        type: 'value',
                        name: '交通流量 (Volume)'
                    },
                    series: [
                        {
                            name: '历史流量 (Historical)',
                            type: 'line',
                            smooth: true,
                            itemStyle: { color: '#5470c6' },
                            areaStyle: {
                                color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                                    { offset: 0, color: 'rgba(84,112,198,0.5)' },
                                    { offset: 1, color: 'rgba(84,112,198,0.1)' }
                                ])
                            },
                            data: histData
                        },
                        {
                            name: '预测流量 (Prediction)',
                            type: 'line',
                            smooth: true,
                            itemStyle: { color: '#ee6666' },
                            lineStyle: { type: 'dashed', width: 3 },
                            data: predData
                        }
                    ]
                };

                myChart.setOption(option);
            })
            .catch(error => {
                document.getElementById('loading').innerText = '加载失败 (Failed to load data)';
                console.error('Error fetching data:', error);
            });

        window.addEventListener('resize', function() {
            myChart.resize();
        });
    </script>
</body>
</html>
